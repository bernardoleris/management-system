spring:
  application:
    name: bernardo-leris-system

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/stock_db?useTimezone=true&serverTimezone=UTC
    username: root
    password: 1234

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
